spring:
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jwt:
    secret: ${JWT_SECRET}
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&CharacterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    open-in-view: false
    database-platform: org.hibernate.dialect.MySQLDialect 
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect 
        show-sql: false
        jdbc:
          time_zone: Asia/Seoul

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    groups-order: DESC
    operationsSorter: method
    disable-swagger-default-url: true
    display-request-duration: true
    defaultModelsExpandDepth: -1
  api-docs:
    path: /v3/api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  paths-to-match:
    - /**

admin:
  number: ${ADMIN_NUMBER}
  password: ${ADMIN_PASSWORD}

server:
  error:
    include-stacktrace: never
    
management:
  endpoints:
    web:
      exposure:
        include: health, info, scheduledtasks
  endpoint:
    health:
      show-details: when_authorized
    scheduledtasks:
      enabled: true

file:
  upload:
    path: uploads/
    max-size: 10485760

logging:
  level:
    com.mjsec.lms.service.com.mjsec.lms.domain.study.service.ScheduledTaskService: INFO
    com.mjsec.lms.service.com.mjsec.lms.service.WeeklyAlertService: INFO
    com.mjsec.lms.service.com.mjsec.lms.domain.study.service.EmailService: INFO
    org.springframework.scheduling: DEBUG #개발할 때만

