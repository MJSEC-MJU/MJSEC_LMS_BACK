name: MJSEC LMS CI

on:
  push: { branches: [ dev ] }
  pull_request: { branches: [ dev ] }

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    env:
      MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
      MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      MYSQL_USER: ${{ secrets.MYSQL_USER }}
      MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      ADMIN_NUMBER: ${{ secrets.ADMIN_NUMBER }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
      GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Create .env
        run: |
          {
            echo "MYSQL_ROOT_PASSWORD=${{ env.MYSQL_ROOT_PASSWORD }}"
            echo "MYSQL_DATABASE=${{ env.MYSQL_DATABASE }}"
            echo "MYSQL_USER=${{ env.MYSQL_USER }}"
            echo "MYSQL_PASSWORD=${{ env.MYSQL_PASSWORD }}"
            echo "JWT_SECRET=${{ env.JWT_SECRET }}"
            echo "ADMIN_NUMBER=${{ env.ADMIN_NUMBER }}"
            echo "ADMIN_PASSWORD=${{ env.ADMIN_PASSWORD }}"
            echo "GMAIL_USERNAME=${{ env.GMAIL_USERNAME }}"
            echo "GMAIL_PASSWORD=${{ env.GMAIL_PASSWORD }}"
          } > .env
          cat .env | sed 's/^\(.*PASSWORD\|JWT_SECRET\)=.*/\1=****/'

      - name: Show Docker versions
        run: |
          docker --version
          docker compose version

      - name: Docker Compose Up (db/redis/app)
        run: |
          docker compose up -d db redis app
          docker compose ps

      - name: Wait for MySQL and restart app
        run: |
          echo "Waiting for MySQL to be ready..."
          for i in $(seq 1 60); do
            if docker compose exec -T db mysqladmin ping -h 127.0.0.1 -uroot -p"${{ env.MYSQL_ROOT_PASSWORD }}" --silent; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/60)"
            sleep 3
          done
          
          # MySQL 준비 확인
          if ! docker compose exec -T db mysqladmin ping -h 127.0.0.1 -uroot -p"${{ env.MYSQL_ROOT_PASSWORD }}" --silent; then
            echo "MySQL failed to become ready"
            docker compose logs db
            exit 1
          fi
          
          echo "MySQL is ready, now restarting app..."
          docker compose restart app
          sleep 20
          
          echo "Waiting for app to be ready..."
          for i in $(seq 1 30); do
            if docker compose ps app | grep -q "running"; then
              echo "App is running!"
              sleep 10  # 완전 시작 대기
              break
            fi
            echo "Waiting for app to start... ($i/30)"
            sleep 5
          done

      - name: Run Tests in Docker
        run: docker compose exec -T app mvn test

      - name: App logs (tail)
        if: always()
        run: docker compose logs --no-color --tail=200 app || true

      - name: Stop containers
        if: always()
        run: docker compose down -v